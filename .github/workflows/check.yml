name: R Tests
on:
  push:
    branches: [main, develop, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.2'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          install.packages(c("yaml", "jsonlite", "ggplot2", "dplyr",
                             "data.table", "survival", "SuperLearner",
                             "tmle", "testthat", "gam"),
                           repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Run tests
        run: |
          source("R/utils/config.R")
          source("R/utils/helpers.R")
          source("R/dgp/DGP.R")
          source("R/tmle/tmle_pipeline.R")
          source("R/estimators/cox_ph_estimator.R")
          source("R/estimators/iptw_survival.R")
          source("R/estimators/aipw_survival.R")
          source("R/estimators/gcomp_risk.R")
          source("R/staging/decision_log.R")
          source("R/staging/checkpoints.R")
          source("R/staging/stage1_cohort.R")
          source("R/staging/stage2_design.R")
          source("R/staging/stage3_estimation.R")
          source("R/staging/stage4_reporting.R")
          testthat::test_dir("tests/testthat",
                             reporter = "summary",
                             stop_on_failure = TRUE)
        shell: Rscript {0}
