dgp:
  'FALSE': 5000
  p_sof: 0.36
  h0: 5.0e-05
  HR_early: 1.25
  HR_late: 0.7
  tau: 45
  max_follow: 720
  risk_window: 30
  seed: 12345
scenarios:
  simple:
    np_hazard: no
    dep_censor: no
    complexity: no
    switch_on: no
  nonlinear:
    np_hazard: no
    dep_censor: no
    complexity: yes
    switch_on: no
  dep_censor:
    np_hazard: no
    dep_censor: yes
    complexity: yes
    switch_on: no
  switching:
    np_hazard: no
    dep_censor: no
    complexity: yes
    switch_on: yes
  np_hazard:
    np_hazard: yes
    dep_censor: no
    complexity: yes
    switch_on: no
simulation:
  n_replicates: 200
  'FALSE': 5000
  time_points:
  - 90
  - 180
  parallel: no
  n_cores: 4
tmle:
  truncation_lower: 0.01
  truncation_upper: 0.99
  sl_library_Q:
  - SL.glm
  - SL.gam
  - SL.ranger
  - SL.glmnet
  - SL.mean
  sl_library_g:
  - SL.glm
  - SL.gam
  - SL.ranger
  - SL.mean
  max_discrete_time: 180
stage1:
  min_N: 500
  min_treated_frac: 0.05
  min_control_frac: 0.05
  max_missingness: 0.3
stage2:
  max_smd: 0.25
  min_ess_frac: 0.05
  min_ps_overlap: 0.1
  max_weight: 50
output:
  base_dir: outputs
  stage1_dir: outputs/stage1
  stage2_dir: outputs/stage2
  stage3_dir: outputs/stage3
  report_dir: outputs/report
  simulation_dir: outputs/simulation
